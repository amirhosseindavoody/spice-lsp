[workspace]
authors = ["Amirhossein Davoody <amirhossein.davoody@gmail.com>"]
channels = ["conda-forge"]
name = "spice-lsp"
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]
version = "0.1.0"

[tasks]
mdbook-build = "mdbook build docs"
mdbook-serve = "mdbook serve docs -n 127.0.0.1 -p 3000"
build = "cargo build --release -p spice-lsp"
build-dev = "cargo build -p spice-lsp"
test = "cargo test --workspace"
spice-lsp = "cargo run -p spice-lsp"
fmt = "cargo fmt --all"
format-spice = "cargo run -q -p spice-lsp -- format"
clippy = "cargo clippy --workspace -- -D warnings"
grammar-generate = { cwd = "tree-sitter-spice", cmd = "npx --yes tree-sitter-cli@0.24 generate" }
ext-install = { cwd = "editors/vscode", cmd = "npm install" }
ext-compile = { cwd = "editors/vscode", cmd = "npm run compile" }
ext-package = "./scripts/package-vscode-extension.sh"
reference-validate = "cargo test -p spice-reference --lib"
reference-docs = "cargo run -q -p spice-reference --bin spice-reference-catalog -- write ."
reference-docs-check = "cargo run -q -p spice-reference --bin spice-reference-catalog -- check ."

[dependencies]
rust = ">=1.96.1,<1.97"
mdbook = ">=0.5.4,<0.6"
nodejs = "22.*"
zig = ">=0.16.0,<0.17"
