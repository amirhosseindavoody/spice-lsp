name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.9
        with:
          pixi-version: latest

      - name: Build
        run: pixi run build-dev

      - name: Test
        run: pixi run test

      - name: Compile VS Code extension
        run: |
          pixi run ext-install
          pixi run ext-compile
